    <path d="M164 118H197C222 118 238 135 241 158H206C202 149 194 144 182 144H164V118Z" fill="#FFFFFF"/>
    <path d="M164 212H197C222 212 238 195 241 172H206C202 181 194 186 182 186H164V212Z" fill="#FFFFFF"/>
    <rect x="130" y="144" width="42" height="42" rx="8" fill="#FFFFFF"/>
