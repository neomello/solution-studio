  <rect x="64" y="54" width="1072" height="312" rx="18" stroke="#02B8F9" stroke-opacity="0.12"/>

  <text x="88" y="84" fill="#6EE7F9" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="13" letter-spacing="4">TC IMPORTACAO E EXPORTACAO LTDA · ASTRO PWA · CPANEL PRODUCTION</text>

