<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TC Partners Official Hub banner</title>
  <desc id="desc">Production banner for the TC Partners Astro PWA official hub on tcpartners.com.br.</desc>
  <defs>
    <linearGradient id="tcCard" x1="90" y1="42" x2="1110" y2="378" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0726"/>
      <stop offset="0.55" stop-color="#000522"/>
      <stop offset="1" stop-color="#050218"/>
    </linearGradient>
    <radialGradient id="tcCore" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(170 166) rotate(52) scale(94)">
      <stop stop-color="#02B8F9"/>
      <stop offset="0.42" stop-color="#3729BE"/>
      <stop offset="1" stop-color="#001674"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#02B8F9" flood-opacity="0.2"/>
    </filter>
  </defs>

